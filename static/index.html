<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股財報 PDF 閱讀器</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }

/* ── Header ── */
header { background: #1a1a2e; color: #fff; padding: 16px 32px; display: flex; align-items: center; gap: 12px; }
header h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.02em; }
header .tag { font-size: 0.7rem; color: #94a3b8; border: 1px solid #334155; border-radius: 4px; padding: 2px 8px; }

/* ── Layout ── */
.container { max-width: 920px; margin: 28px auto; padding: 0 16px; }

/* ── Wizard cards ── */
.card { background: #fff; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 16px; overflow: hidden; }
.card-header { padding: 14px 20px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; gap: 10px; }
.step-badge { background: #1a1a2e; color: #fff; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 700; flex-shrink: 0; }
.step-badge.done { background: #22c55e; }
.card-header h2 { font-size: 0.9rem; font-weight: 600; }
.card-body { padding: 20px; }

/* ── Form ── */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
label { font-size: 0.78rem; color: #64748b; font-weight: 500; }
input, select { border: 1px solid #cbd5e1; border-radius: 6px; padding: 8px 10px; font-size: 0.88rem; outline: none; transition: border-color 0.15s; background: #fff; }
input:focus, select:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.1); }
input[type="file"] { padding: 6px; cursor: pointer; }

/* ── Buttons ── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border-radius: 6px; font-size: 0.88rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
.btn-primary { background: #6366f1; color: #fff; }
.btn-primary:hover { background: #4f46e5; }
.btn-primary:disabled { background: #a5b4fc; cursor: not-allowed; }
.btn-ghost { background: transparent; color: #6366f1; border: 1px solid #c7d2fe; font-size: 0.78rem; padding: 4px 10px; }
.btn-ghost:hover { background: #eef2ff; }

/* ── Alerts ── */
.alert { border-radius: 6px; padding: 10px 14px; font-size: 0.83rem; margin-top: 10px; }
.alert-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
.alert-error   { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
.alert-info    { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; }

/* ── Badges ── */
.badge { font-size: 0.68rem; padding: 2px 7px; border-radius: 999px; font-weight: 600; white-space: nowrap; }
.b-green  { background: #dcfce7; color: #15803d; }
.b-blue   { background: #dbeafe; color: #1d4ed8; }
.b-amber  { background: #fef3c7; color: #92400e; }
.b-red    { background: #fee2e2; color: #b91c1c; }
.b-gray   { background: #f1f5f9; color: #475569; }
.b-purple { background: #ede9fe; color: #6d28d9; }
.b-orange { background: #ffedd5; color: #c2410c; }

/* ── Spinner ── */
.spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,.5); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.hidden { display: none !important; }

/* ════════════════════════════════════════
   RESULTS AREA
════════════════════════════════════════ */

/* Governance bar */
.gov-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; padding: 10px 0 14px; }
.report-title { font-size: 1.1rem; font-weight: 700; margin-right: 8px; }

/* Temporal warning */
.temporal-banner { background: #fffbeb; border: 2px solid #f59e0b; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; }
.temporal-banner .t-title { font-weight: 700; color: #92400e; font-size: 0.85rem; margin-bottom: 4px; }
.temporal-banner .t-body  { font-size: 0.8rem; color: #78350f; line-height: 1.5; }

/* Executive Summary */
.exec-card { background: #1a1a2e; border-radius: 10px; padding: 18px 22px; margin-bottom: 16px; }
.exec-card .ec-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: .1em; color: #64748b; font-weight: 700; margin-bottom: 8px; }
.exec-card .ec-text  { font-size: 0.9rem; line-height: 1.75; color: #e2e8f0; }

/* Key Findings grid */
.kf-section { margin-bottom: 20px; }
.kf-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: .08em; font-weight: 700; color: #6b7280; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.kf-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 10px; }
.kf-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 14px 16px; position: relative; overflow: hidden; }
.kf-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
/* 與 claim-row 同一中性色系：fact=石板灰, derived=靛青, interp=琥珀 */
.kf-card.kf-fact   { --lc: #64748b; }
.kf-card.kf-derived { --lc: #4338ca; }
.kf-card.kf-interp  { --lc: #d97706; }
.kf-card::before { background: var(--lc, #e2e8f0); }
.kf-card .kf-text { font-size: 0.85rem; line-height: 1.5; color: #1e293b; margin-bottom: 8px; }
.kf-card .kf-meta { display: flex; gap: 5px; flex-wrap: wrap; }
.kf-card .kf-page { font-size: 0.7rem; color: #6366f1; font-weight: 700; }
/* 一次性標籤：中性灰，不帶情緒正負 */
.kf-nonrecurring { position: absolute; top: 10px; right: 10px; font-size: 0.62rem; background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; border-radius: 3px; padding: 1px 5px; font-weight: 600; }

/* Tabs */
.tabs { display: flex; gap: 2px; border-bottom: 2px solid #e2e8f0; margin-bottom: 16px; flex-wrap: wrap; }
.tab { padding: 8px 14px; font-size: 0.8rem; font-weight: 600; color: #64748b; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .15s; border-radius: 6px 6px 0 0; white-space: nowrap; }
.tab:hover { background: #f8fafc; color: #1e293b; }
.tab.active { color: #6366f1; border-bottom-color: #6366f1; background: #f5f3ff; }
.tab .tab-count { font-size: 0.65rem; background: #e2e8f0; color: #64748b; border-radius: 999px; padding: 1px 5px; margin-left: 4px; }
.tab.active .tab-count { background: #c7d2fe; color: #4338ca; }

/* Claim cards
   顏色代表「認識論類型」，非情緒好壞：
   fact=石板灰  derived=靛青  interpretation=琥珀（AI判斷，需注意）  insuf=淺灰 */
.claims-pane { display: none; }
.claims-pane.active { display: block; }

.claim-row { border-radius: 8px; padding: 13px 15px; margin-bottom: 8px; border: 1px solid transparent; position: relative; padding-left: 18px; }
.claim-row::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 8px 0 0 8px; background: var(--border-c, #cbd5e1); }

/* observed_fact: 石板灰，中性權威感 */
.claim-row.lv-fact    { background: #f8fafc; border-color: #e2e8f0; --border-c: #64748b; }
/* derived_metric: 靛青，計算/數學感 */
.claim-row.lv-derived { background: #eef2ff; border-color: #c7d2fe; --border-c: #4338ca; }
/* interpretation: 琥珀，AI判斷需注意（非正負評價） */
.claim-row.lv-interp  { background: #fffbeb; border-color: #fde68a; --border-c: #d97706; }
/* insufficient/hypothesis: 淺灰，低可信 */
.claim-row.lv-insuf   { background: #f8fafc; border-color: #e2e8f0; opacity: .72; --border-c: #94a3b8; }

.claim-meta { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; margin-bottom: 5px; }
.claim-text { font-size: 0.88rem; line-height: 1.6; color: #1e293b; }
.claim-text.interp-warn::before { content: '⚠ 詮釋：'; color: #92400e; font-size: 0.75rem; font-weight: 700; margin-right: 4px; }
.non-rec { font-size: 0.65rem; background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; border-radius: 3px; padding: 1px 5px; font-weight: 600; }

/* Evidence toggle */
.ev-toggle { margin-top: 8px; }
.ev-btn { font-size: 0.75rem; color: #6366f1; background: none; border: none; cursor: pointer; padding: 0; font-weight: 600; display: flex; align-items: center; gap: 3px; }
.ev-btn:hover { text-decoration: underline; }
.ev-list { display: none; margin-top: 6px; }
.ev-list.open { display: block; }
.ev-item { font-size: 0.76rem; color: #475569; background: #f8fafc; border-radius: 4px; padding: 5px 9px; margin-top: 4px; display: flex; gap: 7px; align-items: flex-start; }
.ev-page { color: #6366f1; font-weight: 700; flex-shrink: 0; }
.ev-quote { font-style: italic; color: #334155; }

/* Contaminated toggle */
.contaminated-toggle { font-size: 0.78rem; color: #b45309; background: none; border: none; cursor: pointer; padding: 6px 0 0; display: inline-flex; align-items: center; gap: 4px; font-weight: 600; }
.contaminated-toggle:hover { text-decoration: underline; }
.contaminated-section { display: none; margin-top: 8px; padding: 10px; background: #fffbeb; border: 1px dashed #fde68a; border-radius: 6px; }
.contaminated-section.open { display: block; }

/* AI Interpretations section — collapsed by default (Phase 10A) */
.interp-toggle { font-size: 0.78rem; color: #92400e; background: none; border: none; cursor: pointer; padding: 8px 0 0; display: inline-flex; align-items: center; gap: 4px; font-weight: 600; }
.interp-toggle:hover { text-decoration: underline; }
.interp-section { display: none; margin-top: 8px; padding: 10px; background: #fffbeb; border: 1px dashed #fcd34d; border-radius: 6px; }
.interp-section.open { display: block; }
.interp-disclaimer { font-size: 0.72rem; color: #92400e; background: #fef3c7; border: 1px solid #fde68a; border-radius: 4px; padding: 6px 10px; margin-bottom: 8px; line-height: 1.5; }

/* Forward-looking tag */
.fwd-tag { font-size: 0.62rem; font-weight: 600; color: #fff; background: #f97316; border-radius: 3px; padding: 1px 5px; }
/* Rhetorical risk tag */
.rhet-tag { font-size: 0.62rem; font-weight: 600; color: #7c2d12; background: #fef2f2; border: 1px solid #fca5a5; border-radius: 3px; padding: 1px 5px; cursor: help; }
.attr-prefix { font-style: italic; color: #6b7280; font-size: 0.9em; margin-right: 2px; }

/* Source-type badge colours */
.b-amber  { background:#fef3c7; color:#92400e; }
.b-purple { background:#ede9fe; color:#5b21b6; }
.b-green  { background:#dcfce7; color:#166534; }

/* Narrative density banner */
.narrative-banner { display:flex; align-items:flex-start; gap:10px; background:#fff7ed; border:1px solid #fb923c; border-radius:8px; padding:12px 14px; margin-bottom:14px; font-size:.8rem; color:#7c2d12; line-height:1.5; }
.narrative-banner-icon { font-size:1.1rem; flex-shrink:0; margin-top:1px; }

/* Evidence distance label — right-aligned in claim-meta */
.ed-label { font-size: 0.62rem; font-style: italic; margin-left: auto; padding-right: 2px; }
.ed-fact    { color: #64748b; }
.ed-derived { color: #4338ca; }
.ed-interp  { color: #92400e; font-weight: 600; }
.ed-hypo    { color: #94a3b8; }
.ed-insuf   { color: #94a3b8; }

/* Review flag */
.claim-row.review-flag { border-color: #fca5a5 !important; }

/* Stats mini-bar */
.mini-stats { display: flex; gap: 16px; padding: 10px 0 14px; flex-wrap: wrap; }
.ms-item .ms-n { font-size: 1.3rem; font-weight: 800; color: #1a1a2e; line-height: 1; }
.ms-item .ms-l { font-size: 0.65rem; color: #94a3b8; margin-top: 1px; text-transform: uppercase; letter-spacing: .04em; }

/* ════════════════════════════════════════
   COVERAGE MATRIX
════════════════════════════════════════ */
.cov-header { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; padding-bottom: 10px; border-bottom: 2px solid #e2e8f0; margin-bottom: 14px; }
.cov-title { font-size: 1.05rem; font-weight: 700; }
.cov-disclaimer { font-size: 0.72rem; color: #94a3b8; margin-top: 4px; }
.cov-stats { display: flex; gap: 14px; padding: 8px 0 14px; flex-wrap: wrap; }
.cov-stat .cs-n { font-size: 1.2rem; font-weight: 800; line-height: 1; }
.cov-stat .cs-l { font-size: 0.62rem; color: #94a3b8; text-transform: uppercase; letter-spacing: .04em; margin-top: 1px; }
.cov-stat.cs-found    .cs-n { color: #15803d; }
.cov-stat.cs-partial  .cs-n { color: #92400e; }
.cov-stat.cs-missing  .cs-n { color: #64748b; }
.cov-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 8px; }
.cov-item { border-radius: 7px; padding: 10px 13px; display: flex; align-items: flex-start; gap: 10px; border: 1px solid transparent; }
.cov-item.cv-found    { background: #f0fdf4; border-color: #bbf7d0; }
.cov-item.cv-partial  { background: #fffbeb; border-color: #fde68a; }
.cov-item.cv-missing  { background: #f8fafc; border-color: #e2e8f0; }
.cov-item.cv-ambig    { background: #f8fafc; border-color: #e2e8f0; opacity: .75; }
.cov-item.cv-na       { background: #f8fafc; border-color: #e2e8f0; opacity: .6; }
.cov-icon { font-size: 0.95rem; flex-shrink: 0; margin-top: 1px; }
.cov-body .cov-label { font-size: 0.83rem; font-weight: 600; color: #1e293b; }
.cov-body .cov-note  { font-size: 0.72rem; color: #64748b; margin-top: 2px; }
.cov-body .cov-pages { font-size: 0.68rem; color: #6366f1; font-weight: 700; margin-top: 2px; }

/* ── Pattern Results ── */
.pat-title { font-size: 1.05rem; font-weight: 700; }
.pat-disclaimer { font-size: 0.72rem; color: #94a3b8; margin-top: 4px; }
.pat-stats { display: flex; gap: 14px; padding: 8px 0 14px; flex-wrap: wrap; }
.pat-stat .ps-n { font-size: 1.2rem; font-weight: 800; line-height: 1; }
.pat-stat .ps-l { font-size: 0.62rem; color: #94a3b8; text-transform: uppercase; letter-spacing: .04em; margin-top: 1px; }
.pat-stat.ps-triggered .ps-n { color: #92400e; }
.pat-stat.ps-insuf .ps-n { color: #64748b; }
.pat-list { display: flex; flex-direction: column; gap: 10px; }
.pat-item { border-radius: 8px; padding: 12px 15px; border: 1px solid transparent; }
.pat-item.pi-triggered   { background: #fffbeb; border-color: #fde68a; }
.pat-item.pi-insufficient { background: #f8fafc; border-color: #e2e8f0; opacity: .8; }
.pat-item.pi-not_triggered { background: #f8fafc; border-color: #e2e8f0; opacity: .65; }
.pat-item-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.pat-name { font-size: 0.88rem; font-weight: 700; color: #1e293b; }
.pat-obs { font-size: 0.78rem; color: #334155; margin: 6px 0 4px; line-height: 1.5; }
.pat-guard { font-size: 0.68rem; color: #94a3b8; font-style: italic; margin-top: 4px; }
.pat-missing { font-size: 0.72rem; color: #64748b; margin-top: 4px; }
.pat-claims-toggle { font-size: 0.72rem; color: #4338ca; cursor: pointer; margin-top: 6px; user-select: none; }
.pat-claims-toggle:hover { text-decoration: underline; }
.pat-claims-body { margin-top: 6px; display: none; }
.pat-claims-body.open { display: block; }
.pat-claim-row { font-size: 0.72rem; color: #475569; border-left: 2px solid #cbd5e1; padding: 3px 8px; margin-bottom: 4px; }
.pat-claim-row .pcr-id { font-weight: 700; color: #64748b; font-size: 0.65rem; }
.pat-claim-row .pcr-sec { font-size: 0.65rem; color: #94a3b8; margin-left: 6px; }
</style>
</head>
<body>

<header>
  <h1>台股財報 PDF 閱讀器</h1>
  <span class="tag">Evidence-Bound</span>
</header>

<div class="container">

  <!-- STEP 1 -->
  <div class="card" id="step1-card">
    <div class="card-header">
      <div class="step-badge" id="badge1">1</div>
      <h2>上傳財報 PDF</h2>
    </div>
    <div class="card-body">
      <div class="form-row">
        <div class="form-group">
          <label>股票代號 *</label>
          <input type="text" id="stock_id" placeholder="例：2330" maxlength="10">
        </div>
        <div class="form-group">
          <label>公司名稱 *</label>
          <input type="text" id="company_name" placeholder="例：台積電">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>季度 *</label>
          <input type="text" id="period" placeholder="例：2025Q1">
        </div>
        <div class="form-group">
          <label>報告類型</label>
          <select id="document_type">
            <option value="quarterly_report">季報</option>
            <option value="annual_report">年報</option>
            <option value="earnings_release">法說會</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>產業別</label>
          <select id="industry_type">
            <option value="general">一般</option>
            <option value="cdmo">生技 CDMO</option>
            <option value="semiconductor">半導體</option>
          </select>
        </div>
        <div class="form-group"></div>
      </div>
      <div class="form-group" style="margin-bottom:14px;">
        <label>PDF 檔案 *</label>
        <input type="file" id="pdf_file" accept=".pdf">
      </div>
      <button class="btn btn-primary" onclick="uploadPDF()" id="upload-btn">上傳</button>
      <div id="upload-result"></div>
    </div>
  </div>

  <!-- STEP 2 -->
  <div class="card hidden" id="step2-card">
    <div class="card-header">
      <div class="step-badge" id="badge2">2</div>
      <h2>解析文件</h2>
    </div>
    <div class="card-body">
      <div class="alert alert-success" id="upload-success-msg"></div>
      <br>
      <button class="btn btn-primary" onclick="ingestDoc()" id="ingest-btn">開始解析</button>
      <div id="ingest-result"></div>
    </div>
  </div>

  <!-- STEP 3 -->
  <div class="card hidden" id="step3-card">
    <div class="card-header">
      <div class="step-badge" id="badge3">3</div>
      <h2>產生 AI 分析</h2>
    </div>
    <div class="card-body">
      <div class="alert alert-success" id="ingest-success-msg"></div>
      <br>
      <button class="btn btn-primary" onclick="generateSummary()" id="summary-btn">產生分析</button>
      <p style="font-size:.76rem;color:#94a3b8;margin-top:6px;">呼叫 Claude API，通常需要 30–90 秒</p>
      <div id="summary-result"></div>
    </div>
  </div>

  <!-- Results -->
  <div class="hidden" id="results-area">
    <div id="results-body"></div>
  </div>

  <!-- STEP 4 -->
  <div class="card hidden" id="step4-card">
    <div class="card-header">
      <div class="step-badge" id="badge4">4</div>
      <h2>揭露完整性稽核</h2>
    </div>
    <div class="card-body">
      <p style="font-size:.8rem;color:#64748b;margin-bottom:12px;">
        逐一檢查 14 項法定揭露事項（第 12、17 條 + IFRS）是否出現於財報中
      </p>
      <button class="btn btn-primary" onclick="runCoverage()" id="coverage-btn">執行稽核</button>
      <p style="font-size:.76rem;color:#94a3b8;margin-top:6px;">使用 Haiku 模型，約 10–20 秒</p>
      <div id="coverage-result"></div>
    </div>
  </div>

  <!-- Coverage Matrix -->
  <div class="hidden" id="coverage-area">
    <div id="coverage-body"></div>
  </div>

  <!-- STEP 5 -->
  <div class="card hidden" id="step5-card">
    <div class="card-header">
      <div class="step-badge" id="badge5">5</div>
      <h2>財報檢查模式</h2>
    </div>
    <div class="card-body">
      <p style="font-size:.8rem;color:#64748b;margin-bottom:12px;">
        6 個常見財報警示模式，基於現有 claims 屬性掃描，不呼叫 AI
      </p>
      <button class="btn btn-primary" onclick="runPatterns()" id="patterns-btn">執行財報檢查</button>
      <p style="font-size:.76rem;color:#94a3b8;margin-top:6px;">純本地邏輯，不呼叫 Claude API，通常 &lt;1 秒完成</p>
      <div id="patterns-result"></div>
    </div>
  </div>

  <!-- Pattern Results -->
  <div class="hidden" id="patterns-area">
    <div id="patterns-body"></div>
  </div>

</div>

<script>
let documentId = null;

/* ── Mappings ── */
const LEVEL_CLASS = {
  observed_fact: 'lv-fact', derived_metric: 'lv-derived',
  interpretation: 'lv-interp', hypothesis: 'lv-insuf',
  insufficient_evidence: 'lv-insuf',
};
const LEVEL_BADGE = {
  observed_fact:        ['b-gray',   '直接事實'],   // 石板灰：中性事實
  derived_metric:       ['b-blue',   '衍生指標'],   // 靛青：計算結果
  interpretation:       ['b-amber',  '詮釋'],       // 琥珀：AI判斷
  hypothesis:           ['b-gray',   '假設'],
  insufficient_evidence:['b-gray',   '證據不足'],
};
const KF_CLASS = {
  observed_fact: 'kf-fact', derived_metric: 'kf-derived',
  interpretation: 'kf-interp',
};
const EVIDENCE_DISTANCE = {
  observed_fact:         { label: '財報直接揭露',    cls: 'ed-fact' },
  derived_metric:        { label: '由財報數字計算',  cls: 'ed-derived' },
  interpretation:        { label: 'AI 假設·需確認', cls: 'ed-interp' },
  hypothesis:            { label: 'AI 推測·低確信', cls: 'ed-hypo' },
  insufficient_evidence: { label: '缺少足夠證據',    cls: 'ed-insuf' },
};
const SOURCE_TYPE_BADGE = {
  financial_evidence:    ['b-blue',   '財報數字'],
  operational_evidence:  ['b-green',  '運營事實'],
  strategic_narrative:   ['b-amber',  '戰略敘事'],
  management_expectation:['b-purple', '管理展望'],
};
const SECTION_META = {
  key_financials:         { icon: '📊', label: '核心財務' },
  accounting_adjustments: { icon: '🔧', label: '會計調整' },
  liquidity:              { icon: '💧', label: '流動性' },
  risk_register:          { icon: '⚠️', label: '風險' },
  pipeline:               { icon: '🔬', label: 'Pipeline' },
  evidence_gaps:          { icon: '❓', label: '不足' },
};
const SECTION_ORDER = ['key_financials','accounting_adjustments','liquidity','risk_register','pipeline','evidence_gaps'];
const TIER_ORDER    = { tier_a:0, tier_b:1, tier_c:2 };

/* ── Helpers ── */
async function parseResponse(res) {
  const text = await res.text();
  let data;
  try { data = JSON.parse(text); } catch { throw new Error(`HTTP ${res.status}: ${text.slice(0,200)}`); }
  if (!res.ok) throw new Error(data.detail || JSON.stringify(data));
  return data;
}
function setResult(id, type, msg) {
  const el = document.getElementById(id);
  if (!msg) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="alert alert-${type==='error'?'error':'info'}">${msg}</div>`;
}
function badge(cls, text) { return `<span class="badge ${cls}">${text}</span>`; }

/* ── Steps ── */
async function uploadPDF() {
  const stockId=document.getElementById('stock_id').value.trim();
  const companyName=document.getElementById('company_name').value.trim();
  const period=document.getElementById('period').value.trim();
  const docType=document.getElementById('document_type').value;
  const fileInput=document.getElementById('pdf_file');
  if (!stockId||!companyName||!period||!fileInput.files[0]) {
    setResult('upload-result','error','請填寫所有必填欄位並選擇 PDF 檔案'); return;
  }
  const btn=document.getElementById('upload-btn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> 上傳中...';
  const fd=new FormData();
  const industryType=document.getElementById('industry_type').value;
  fd.append('file',fileInput.files[0]); fd.append('stock_id',stockId);
  fd.append('company_name',companyName); fd.append('period',period);
  fd.append('document_type',docType); fd.append('industry_type',industryType);
  try {
    const data=await parseResponse(await fetch('/api/v1/documents/upload',{method:'POST',body:fd}));
    documentId=data.document_id;
    document.getElementById('badge1').textContent='✓';
    document.getElementById('badge1').classList.add('done');
    document.getElementById('upload-success-msg').textContent=`✅ 上傳成功  ${documentId}`;
    document.getElementById('step2-card').classList.remove('hidden');
    document.getElementById('step2-card').scrollIntoView({behavior:'smooth'});
  } catch(e) { setResult('upload-result','error','上傳失敗：'+e.message); }
  finally { btn.disabled=false; btn.innerHTML='上傳'; }
}

async function ingestDoc() {
  const btn=document.getElementById('ingest-btn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> 解析中...';
  try {
    const data=await parseResponse(await fetch(`/api/v1/documents/${documentId}/ingest`,{method:'POST'}));
    document.getElementById('badge2').textContent='✓';
    document.getElementById('badge2').classList.add('done');
    document.getElementById('ingest-success-msg').textContent=
      `✅ 解析完成  ${data.pages_extracted} 頁 / ${data.chunks_created} 個 chunks`;
    document.getElementById('step3-card').classList.remove('hidden');
    document.getElementById('step3-card').scrollIntoView({behavior:'smooth'});
  } catch(e) { setResult('ingest-result','error','解析失敗：'+e.message); }
  finally { btn.disabled=false; btn.innerHTML='開始解析'; }
}

async function generateSummary() {
  const btn=document.getElementById('summary-btn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Claude 分析中，請稍候...';
  try {
    const data=await parseResponse(await fetch(`/api/v1/documents/${documentId}/summary`,{method:'POST'}));
    document.getElementById('badge3').textContent='✓';
    document.getElementById('badge3').classList.add('done');
    renderResults(data);
    document.getElementById('results-area').classList.remove('hidden');
    document.getElementById('results-area').scrollIntoView({behavior:'smooth'});
    // Show Step 4 + Step 5 after summary completes
    document.getElementById('step4-card').classList.remove('hidden');
    document.getElementById('step5-card').classList.remove('hidden');
  } catch(e) { setResult('summary-result','error','摘要失敗：'+e.message); }
  finally { btn.disabled=false; btn.innerHTML='產生分析'; }
}

async function runCoverage() {
  const btn=document.getElementById('coverage-btn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Haiku 稽核中...';
  try {
    const data=await parseResponse(await fetch(`/api/v1/documents/${documentId}/disclosure-coverage`,{method:'POST'}));
    document.getElementById('badge4').textContent='✓';
    document.getElementById('badge4').classList.add('done');
    renderCoverage(data);
    document.getElementById('coverage-area').classList.remove('hidden');
    document.getElementById('coverage-area').scrollIntoView({behavior:'smooth'});
  } catch(e) { setResult('coverage-result','error','稽核失敗：'+e.message); }
  finally { btn.disabled=false; btn.innerHTML='執行稽核'; }
}

/* ══════════════════════════════════════════
   RENDER RESULTS
══════════════════════════════════════════ */
function renderResults(data) {
  const claims = data.claims || [];
  const cleanClaims = claims.filter(c => !c.contaminated);
  const contaminatedClaims = claims.filter(c => c.contaminated);
  // KEY FINDINGS: tier_a + fact/metric only — interpretations excluded
  const tierA = cleanClaims.filter(c => c.materiality === 'tier_a');
  const keyFindings = tierA.filter(c => c.claim_level === 'observed_fact' || c.claim_level === 'derived_metric');
  const reviewCount = cleanClaims.filter(c => c.requires_human_review).length;

  /* ── Governance badges ── */
  const advBadge = data.investment_advice_detected
    ? badge('b-red','⚠ 投資建議語言')
    : badge('b-green','✓ 無投資建議');
  const evBadge = {complete:badge('b-green','evidence 完整'),partial:badge('b-amber','evidence 部分'),insufficient:badge('b-red','evidence 不足')}[data.evidence_status]||'';

  let html = `
    <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;padding-bottom:10px;border-bottom:2px solid #e2e8f0;margin-bottom:14px;">
      <span class="report-title">${data.stock_id||''} ${data.period||''}</span>
      ${evBadge} ${advBadge}
      ${reviewCount>0?badge('b-amber',`⚠ ${reviewCount} 需人工審查`):''}
    </div>`;

  /* ── Temporal Banner ── */
  if (!data.temporal_consistent) {
    html += `<div class="temporal-banner">
      <div class="t-title">⚠️ 時間軸不一致 — 分析結果部分無效</div>
      <div class="t-body">
        要求期間：<b>${data.requested_period}</b>　文件實際期間：<b>${data.document_period}</b><br>
        ${data.temporal_note||''}
        ${contaminatedClaims.length?`<br><span style="color:#b45309">${contaminatedClaims.length} 條 derived_metric / interpretation 已標記為 contaminated，顯示於各分頁底部</span>`:''}
      </div>
    </div>`;
  }

  /* ── Mini stats ── */
  const byLv = {};
  cleanClaims.forEach(c=>{ byLv[c.claim_level]=(byLv[c.claim_level]||0)+1; });
  html += `<div class="mini-stats">
    <div class="ms-item"><div class="ms-n">${cleanClaims.length}</div><div class="ms-l">觀察數</div></div>
    <div class="ms-item"><div class="ms-n">${tierA.length}</div><div class="ms-l">Tier A</div></div>
    <div class="ms-item"><div class="ms-n">${byLv.observed_fact||0}</div><div class="ms-l">直接事實</div></div>
    <div class="ms-item"><div class="ms-n">${byLv.derived_metric||0}</div><div class="ms-l">衍生指標</div></div>
    <div class="ms-item"><div class="ms-n">${byLv.interpretation||0}</div><div class="ms-l">詮釋</div></div>
  </div>`;

  /* ── Narrative Density Banner ── */
  if (data.narrative_flag) {
    const cntPct  = Math.round((data.narrative_density_score||0) * 100);
    const textPct = Math.round((data.narrative_density_weighted_score||0) * 100);
    html += `<div class="narrative-banner">
      <span class="narrative-banner-icon">⚠️</span>
      <div>
        <strong>戰略敘事密度高：claim 數 ${cntPct}%，文字占比 ${textPct}%</strong><br>
        <span>本報告中戰略敘事與管理展望類 claims 佔比超過 60%，直接財務 evidence 相對不足。建議對比財報數字後再使用 AI 分析結論。</span>
      </div>
    </div>`;
  }

  /* ── Executive Summary ── */
  if (data.executive_summary) {
    const claimMix = [
      byLv.observed_fact   ? `${byLv.observed_fact} 條直接事實`   : '',
      byLv.derived_metric  ? `${byLv.derived_metric} 條衍生指標`  : '',
      byLv.interpretation  ? `${byLv.interpretation} 條詮釋`      : '',
    ].filter(Boolean).join('、');
    const reviewNote = reviewCount > 0 ? `其中 <b>${reviewCount} 條</b>需人工審查。` : '';
    html += `<div class="exec-card">
      <div class="ec-label">Executive Summary</div>
      <div class="ec-text">${data.executive_summary}</div>
      <div style="margin-top:12px;padding-top:10px;border-top:1px solid #334155;font-size:.75rem;color:#64748b;line-height:1.6;">
        本摘要基於 <b style="color:#94a3b8">${claimMix}</b>。${reviewNote}
      </div>
    </div>`;
  }

  /* ── Key Findings (tier_a + fact/metric only, no interpretations) ── */
  if (keyFindings.length > 0) {
    const interpExcluded = tierA.length - keyFindings.length;
    html += `<div class="kf-section">
      <div class="kf-label">⚡ Key Findings
        <span style="font-weight:400;color:#9ca3af;">（Tier A · 直接事實 + 衍生指標）</span>
        ${interpExcluded>0?`<span style="font-weight:400;color:#f59e0b;font-size:.65rem;margin-left:4px;">${interpExcluded} 條詮釋已移至分頁</span>`:''}
      </div>
      <div class="kf-grid">`;
    const KF_MAX = 4;
    const kfHidden = keyFindings.length - KF_MAX;
    keyFindings.slice(0, KF_MAX).forEach(c => {
      const kfc = KF_CLASS[c.claim_level] || 'kf-derived';
      const pages = (c.evidence||[]).map(e=>`P.${e.page}`).join(' ');
      html += `<div class="kf-card ${kfc}">
        ${!c.recurring?'<span class="kf-nonrecurring">一次性</span>':''}
        <div class="kf-text">${c.claim}</div>
        <div class="kf-meta">
          ${badge(LEVEL_BADGE[c.claim_level]?.[0]||'b-gray', LEVEL_BADGE[c.claim_level]?.[1]||c.claim_level)}
          ${pages?`<span class="kf-page">${pages}</span>`:''}
          ${c.requires_human_review?badge('b-red','需審查'):''}
        </div>
      </div>`;
    });
    if (kfHidden > 0) {
      html += `<div style="font-size:.72rem;color:#64748b;padding:4px 2px;">+${kfHidden} 條請見下方分頁</div>`;
    }
    html += `</div></div>`;
  }

  /* ── Group claims by section ── */

  const grouped = {};
  SECTION_ORDER.forEach(k => grouped[k]=[]);
  cleanClaims.forEach(c => {
    const k = c.section_key||'key_financials';
    if (!grouped[k]) grouped[k]=[];
    grouped[k].push(c);
  });
  SECTION_ORDER.forEach(k => grouped[k].sort((a,b)=>(TIER_ORDER[a.materiality]||1)-(TIER_ORDER[b.materiality]||1)));

  /* ── Tabs ── */
  html += `<div class="tabs" id="tabs-row">`;
  SECTION_ORDER.forEach((k,i) => {
    const m = SECTION_META[k];
    const cnt = grouped[k].length + (contaminatedClaims.filter(c=>c.section_key===k).length);
    if (cnt === 0) return;
    html += `<div class="tab${i===0?' active':''}" onclick="switchTab('${k}')" id="tab-${k}">
      ${m.icon} ${m.label}<span class="tab-count">${cnt}</span>
    </div>`;
  });
  html += `</div>`;

  /* ── Claims panes ── */
  SECTION_ORDER.forEach((k,i) => {
    const sectionClaims = grouped[k];
    const sectionContam = contaminatedClaims.filter(c=>c.section_key===k);
    if (sectionClaims.length===0 && sectionContam.length===0) return;

    /* Phase 10A: separate primary evidence from AI interpretations */
    const factClaims = sectionClaims.filter(c =>
      c.claim_level === 'observed_fact' ||
      c.claim_level === 'derived_metric' ||
      c.claim_level === 'insufficient_evidence'
    );
    const interpClaims = sectionClaims.filter(c =>
      c.claim_level === 'interpretation' || c.claim_level === 'hypothesis'
    );

    html += `<div class="claims-pane${i===0?' active':''}" id="pane-${k}">`;

    /* Primary: direct evidence only */
    factClaims.forEach(c => { html += renderClaim(c); });
    if (factClaims.length === 0 && interpClaims.length > 0) {
      html += `<div style="font-size:.8rem;color:#94a3b8;padding:8px 4px;font-style:italic;">本節無直接事實揭露</div>`;
    }

    /* AI interpretations: collapsed by default */
    if (interpClaims.length > 0) {
      html += `<button class="interp-toggle" onclick="toggleInterp('interp-${k}')">
        🧠 AI 假設與詮釋（${interpClaims.length} 條）— 展開確認
      </button>
      <div class="interp-section" id="interp-${k}">
        <div class="interp-disclaimer">以下為 AI 詮釋，非財報直接事實。請結合原文查證後使用，不得單獨引用。</div>`;
      interpClaims.forEach(c => { html += renderClaim(c); });
      html += `</div>`;
    }

    /* Contaminated section (collapsed by default) */
    if (sectionContam.length > 0) {
      html += `<button class="contaminated-toggle" onclick="toggleContam('contam-${k}')">
        ▶ 顯示 ${sectionContam.length} 條已污染觀察（時間軸不一致）
      </button>
      <div class="contaminated-section" id="contam-${k}">`;
      sectionContam.forEach(c => { html += renderClaim(c, true); });
      html += `</div>`;
    }
    html += `</div>`;
  });

  document.getElementById('results-body').innerHTML = html;

  /* Activate first non-empty tab */
  const firstTab = SECTION_ORDER.find(k => (grouped[k].length + contaminatedClaims.filter(c=>c.section_key===k).length) > 0);
  if (firstTab) switchTab(firstTab);
}

function renderClaim(c, isContaminated=false) {
  const lvCls = isContaminated ? 'lv-insuf' : (LEVEL_CLASS[c.claim_level]||'lv-insuf');
  const [bCls, bLabel] = LEVEL_BADGE[c.claim_level] || ['b-gray', c.claim_level];
  const isInterp = c.claim_level === 'interpretation' || c.claim_level === 'hypothesis';
  const reviewCls = (!isContaminated && c.requires_human_review) ? ' review-flag' : '';
  const evHtml = (c.evidence||[]).map(e =>
    `<div class="ev-item"><span class="ev-page">P.${e.page}</span><span class="ev-quote">${e.quoted_text||e.section||''}</span></div>`
  ).join('');
  const evId = 'ev-'+c.claim_id;
  const edInfo = EVIDENCE_DISTANCE[c.claim_level] || { label: c.claim_level, cls: 'ed-insuf' };
  // Lower rhetorical confidence for interpretation/hypothesis
  const attrPfx = c.attribution_prefix ? `<span class="attr-prefix">${c.attribution_prefix}</span>` : '';
  const claimText = isInterp ? `可能需要檢查：${attrPfx}${c.claim}` : `${attrPfx}${c.claim}`;
  const stBadge = c.source_type && SOURCE_TYPE_BADGE[c.source_type]
    ? badge(SOURCE_TYPE_BADGE[c.source_type][0], SOURCE_TYPE_BADGE[c.source_type][1])
    : '';
  const fwdTag = c.forward_looking ? '<span class="fwd-tag">前瞻</span>' : '';
  const rhetTag = c.rhetorical_risk_flag
    ? `<span class="rhet-tag" title="敘事語氣偏強：${(c.rhetorical_risk_terms||[]).join('、')}">敘事語氣偏強</span>`
    : '';

  return `<div class="claim-row ${lvCls}${reviewCls}">
    <div class="claim-meta">
      ${badge(bCls, bLabel)}
      ${c.claim_type?badge('b-gray',c.claim_type):''}
      ${stBadge}
      ${fwdTag}
      ${rhetTag}
      ${!c.recurring?'<span class="non-rec">一次性</span>':''}
      ${isContaminated?badge('b-orange','contaminated'):''}
      ${(!isContaminated&&c.requires_human_review)?badge('b-red','需人工審查'):''}
      <span class="ed-label ${edInfo.cls}">${edInfo.label}</span>
    </div>
    <div class="claim-text${isInterp?' interp-warn':''}">${claimText}</div>
    ${evHtml?`<div class="ev-toggle">
      <button class="ev-btn" onclick="toggleEv('${evId}')">▶ 查看來源</button>
      <div class="ev-list" id="${evId}">${evHtml}</div>
    </div>`:''}
  </div>`;
}

function switchTab(key) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.claims-pane').forEach(p => p.classList.remove('active'));
  const t = document.getElementById('tab-'+key);
  const p = document.getElementById('pane-'+key);
  if (t) t.classList.add('active');
  if (p) p.classList.add('active');
}
function toggleEv(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  el.classList.toggle('open');
  btn.textContent = el.classList.contains('open') ? '▼ 收起來源' : '▶ 查看來源';
}
function toggleContam(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  el.classList.toggle('open');
  btn.textContent = el.classList.contains('open')
    ? '▲ 隱藏已污染觀察'
    : `▶ 顯示 ${el.querySelectorAll('.claim-row').length} 條已污染觀察（時間軸不一致）`;
}
function toggleInterp(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  el.classList.toggle('open');
  const cnt = el.querySelectorAll('.claim-row').length;
  btn.textContent = el.classList.contains('open')
    ? '▲ 收起 AI 假設與詮釋'
    : `🧠 AI 假設與詮釋（${cnt} 條）— 展開確認`;
}

  found_incomplete: { cls: 'cv-partial', icon: '△', label: '揭露不完整' },
  not_found:        { cls: 'cv-missing', icon: '✕', label: '未找到' },

};

async function runPatterns() {
  const btn=document.getElementById('patterns-btn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> 分析中...';
  try {
    const data=await parseResponse(await fetch(`/api/v1/documents/${documentId}/patterns/run`,{method:'POST'}));
    document.getElementById('badge5').textContent='✓';
    document.getElementById('badge5').classList.add('done');
    renderPatterns(data);
    document.getElementById('patterns-area').classList.remove('hidden');
    document.getElementById('patterns-area').scrollIntoView({behavior:'smooth'});
  } catch(e) { setResult('patterns-result','error','檢查失敗：'+e.message); }

}

const PAT_STATUS = {
  triggered:            { cls:'pi-triggered',    icon:'⚠', label:'觸發' },
  insufficient_evidence:{ cls:'pi-insufficient', icon:'—', label:'證據不足' },
  not_triggered:        { cls:'pi-not_triggered', icon:'✓', label:'未觸發' },
};

function renderPatterns(data) {
  const results = data.results || [];
  let html = `
    <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;padding-bottom:10px;border-bottom:2px solid #e2e8f0;margin-bottom:14px;">
      <span class="pat-title">${data.stock_id||''} ${data.period||''} — 財報檢查模式</span>
    </div>
    <p class="pat-disclaimer">⚠ 此觀察為 AI 推論，非確定事實。所有 pattern 結果均為詮釋層級，需人工確認，不進入 Key Findings。</p>
    <div class="pat-stats">
      <div class="pat-stat ps-triggered">
        <div class="ps-n">${data.triggered_count}</div><div class="ps-l">觸發</div>
      </div>
      <div class="pat-stat ps-insuf">
        <div class="ps-n">${data.insufficient_count}</div><div class="ps-l">證據不足</div>
      </div>
      <div class="pat-stat">
        <div class="ps-n" style="color:#64748b;">${data.not_triggered_count}</div><div class="ps-l">未觸發</div>
      </div>
    </div>
    <div class="pat-list">`;

  results.forEach((r, idx) => {
    const s = PAT_STATUS[r.status] || PAT_STATUS.insufficient_evidence;
    const claimsId = `pat-claims-${idx}`;
    html += `<div class="pat-item ${s.cls}">
      <div class="pat-item-header">
        ${badge(r.status==='triggered'?'b-amber':'b-gray', s.icon+' '+s.label)}
        <span class="pat-name">${r.name_zh}</span>
      </div>`;

    if (r.status === 'triggered') {
      html += `<div class="pat-obs">${r.generated_observation}</div>`;
      if (r.source_claims && r.source_claims.length) {
        html += `<div class="pat-claims-toggle" onclick="togglePatClaims('${claimsId}')">
          ▶ 觸發來源 (${r.source_claims.length} 條 claims)
        </div>
        <div class="pat-claims-body" id="${claimsId}">`;
        r.source_claims.forEach(c => {
          html += `<div class="pat-claim-row">
            <span class="pcr-id">${c.claim_id}</span>
            <span class="pcr-sec">[${c.section_key||''} / ${c.materiality||''}]</span><br>
            ${c.claim||''}
          </div>`;
        });
        html += `</div>`;
      }
      html += `<div class="pat-guard">⚠ 詮釋，需人工確認 · 此觀察為 AI 推論，非確定事實</div>`;
    } else if (r.status === 'insufficient_evidence' && r.missing_evidence_keys && r.missing_evidence_keys.length) {
      html += `<div class="pat-missing">缺少必要 evidence：${r.missing_evidence_keys.join('；')}</div>`;
    }

    html += `</div>`;
  });

  html += `</div>`;
  document.getElementById('patterns-body').innerHTML = html;
}

function togglePatClaims(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('open');
  const toggle = el.previousElementSibling;
  if (toggle) toggle.textContent = toggle.textContent.replace(/^[▶▼]/, el.classList.contains('open') ? '▼' : '▶');
}

function renderCoverage(data) {
  const items = data.items || [];
  let html = `
    <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;padding-bottom:10px;border-bottom:2px solid #e2e8f0;margin-bottom:14px;">
      <span class="cov-title">${data.stock_id||''} ${data.period||''} — 揭露完整性稽核</span>
    </div>
    <p class="cov-disclaimer">⚠ 此稽核只判斷揭露是否出現於財報中，不代表財報品質、法遵評等或任何投資建議。</p>
    <div class="cov-stats">
      <div class="cov-stat cs-found">
        <div class="cs-n">${data.found_count}</div><div class="cs-l">已揭露</div>
      </div>
      <div class="cov-stat cs-partial">
        <div class="cs-n">${data.found_incomplete_count}</div><div class="cs-l">不完整</div>
      </div>
      <div class="cov-stat cs-missing">
        <div class="cs-n">${data.not_found_count}</div><div class="cs-l">未找到</div>
      </div>
      <div class="cov-stat">
        <div class="cs-n" style="color:#64748b;">${data.total_count}</div><div class="cs-l">總項目</div>
      </div>
    </div>
    <div class="cov-grid">`;

  items.forEach(item => {
    const s = COV_STATUS[item.status] || COV_STATUS.ambiguous;
    const pages = (item.evidence_pages||[]).map(p=>`p.${p}`).join(' ');
    html += `<div class="cov-item ${s.cls}">
      <span class="cov-icon">${s.icon}</span>
      <div class="cov-body">
        <div class="cov-label">${item.label_zh}</div>
        ${item.note?`<div class="cov-note">${item.note}</div>`:''}
        ${pages?`<div class="cov-pages">${pages}</div>`:''}
      </div>
    </div>`;
  });
  html += `</div>`;
  document.getElementById('coverage-body').innerHTML = html;
}
</script>
</body>
</html>
