    owner: "GavinWu"
    added_at: "2026-04-01"
    expiry: "2026-10-01"
    revalidation_trigger: "When a local fixture for external contracts is added."
    active: true

  - id: EX-006
    pattern: "session_start_can_auto_discover"
    scope: "test_name_contains"
    failure_kind: "external_exclusion"
    justification: "Same external contract dependency as EX-005."
    owner: "GavinWu"
    added_at: "2026-04-01"
    expiry: "2026-10-01"
    revalidation_trigger: "Same as EX-005"
