    owner: "GavinWu"
    added_at: "2026-04-01"
    expiry: "2026-10-01"
    revalidation_trigger: "When auditor can run against local fixture repos."
    active: true

  - id: EX-009
    pattern: "publication_reader"
    scope: "test_name_contains"
    failure_kind: "external_exclusion"
    justification: >
      Publication reader tests require a pre-published release bundle.
